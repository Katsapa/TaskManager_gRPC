syntax = "proto3";

option java_package = "com.katsapa.taskmanager.grpc";
option java_outer_classname = "TaskProto";

service TaskService {
  rpc CreateTask (CreateTaskRequest) returns (TaskResponse);       // Unary
  rpc ListTasks  (ListTasksRequest)  returns (stream TaskResponse); // Server Streaming
  rpc GetTask    (GetTaskRequest)    returns (TaskResponse);
  rpc UpdateTaskStatus (UpdateStatusRequest) returns (TaskResponse);
}

message CreateTaskRequest {
  string title = 1;
  string description = 2;
}

message TaskResponse {
  string id = 1;
  string title = 2;
  string description = 3;
  string status = 4;
}

message GetTaskRequest {
  string id = 1;
}

message ListTasksRequest {}

message UpdateStatusRequest {
  string id = 1;
  string status = 2;
}